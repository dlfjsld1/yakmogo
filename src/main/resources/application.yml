spring:
  application:
    name: yakmogo # 프로젝트 이름

  # 1. 데이터베이스 설정 MariaDB로 교체
  datasource:
    url: jdbc:mariadb://${RASPI_IP}:3306/yakmogo
    username: yakmogo_user
    password: ${YAKMOGO_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  # 2. JPA 설정 (H2 -> MariaDB로 변경)
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: false
    baseline-version: 1
    baseline-description: existing-schema-before-flyway
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

# 3. 텔레그램 설정
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME:yakson_bot}
    chat-id: ${TELEGRAM_CHAT_ID}

# 4. 관리자 패스워드 설정
admin:
  password: ${ADMIN_PASSWORD}

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET}
    ttl-seconds: ${AUTH_TOKEN_TTL_SECONDS:3600}
    login-proof-ttl-seconds: ${AUTH_LOGIN_PROOF_TTL_SECONDS:300}

# 5. 프론트엔드 도메인 설정
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      discovery:
        enabled: false
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
