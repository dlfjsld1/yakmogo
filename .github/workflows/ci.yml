name: Backend CI

on:
  push:
    branches:
      - enhancement
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - enhancement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean test bootJar --no-daemon
