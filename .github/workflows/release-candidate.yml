name: Main Release Candidate

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: test-root-password
          MARIADB_DATABASE: yakmogo_test
          MARIADB_USER: yakmogo_test
          MARIADB_PASSWORD: test-database-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost -uroot -ptest-root-password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      MARIADB_TEST_URL: jdbc:mariadb://127.0.0.1:3306/yakmogo_test
      MARIADB_TEST_USER: yakmogo_test
      MARIADB_TEST_PASSWORD: test-database-password
    steps:
      - name: Check out backend main
        uses: actions/checkout@v4

      - name: Check out web main
        uses: actions/checkout@v4
        with:
          repository: dlfjsld1/yakmogo-web
          ref: main
          path: yakmogo-web

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: yakmogo-web/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up ARM64 emulation
        uses: docker/setup-qemu-action@v3

      - name: Verify web
        working-directory: yakmogo-web
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

      - name: Build portable ARM64 package
        run: |
          chmod +x scripts/ci/*.sh scripts/release/*.sh deploy/portable/*.sh gradlew
          scripts/release/build-image.sh \
            "0.0.7-main.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" \
            yakmogo-web/dist

      - name: Verify one-command install, restore, and rollback
        run: scripts/ci/test-portable-install.sh build/portable

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: yakmogo-main-${{ github.sha }}
          path: |
            build/yakmogo-*-portable.tar.gz
            build/yakmogo-*-portable.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7
